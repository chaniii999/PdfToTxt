<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF OCR 테스트</title>
  <style>
    body { font-family: sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .upload-wrap { display: flex; flex-direction: column; gap: 1rem; padding: 1.5rem; border: 2px dashed #ccc; border-radius: 8px; transition: border-color 0.2s, background 0.2s; }
    input[type="file"] { padding: 0.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 4px; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .progress-wrap { display: none; }
    .progress-bar-bg { width: 100%; height: 24px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
    .progress-bar-fill { height: 100%; width: 0%; background: #333; border-radius: 4px; transition: width 0.3s ease; }
    .progress-label { font-size: 0.85rem; color: #666; }
    .progress-time { font-size: 0.85rem; color: #444; font-variant-numeric: tabular-nums; }
    .progress-info { display: flex; justify-content: space-between; align-items: center; }
    .h-4 { height: 0.25rem; }
    .h-6 { height: 0.375rem; }
    .h-16 { height: 1rem; }
    .result-header { display: flex; justify-content: space-between; align-items: center; }
    .result-title { font-weight: bold; }
    .result-text { white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; padding: 1rem; background: #f5f5f5; border-radius: 4px; min-height: 120px; max-height: 500px; overflow-y: auto; font-size: 1rem; min-width: 0; }
    .result-header-left { display: flex; align-items: center; gap: 1rem; }
    .accuracy-result { padding: 0.25rem 0.5rem; background: #f0f8ff; border-radius: 4px; font-size: 0.85rem; }
    .method-info { font-size: 0.85rem; color: #666; }
    .error { color: #c00; }
    .compare-section { display: flex; flex-direction: column; gap: 0.5rem; }
    .compare-label { font-size: 0.9rem; font-weight: 500; }
    .compare-textarea { min-height: 80px; padding: 0.5rem; font-family: inherit; font-size: 0.9rem; resize: vertical; border: 1px solid #ccc; border-radius: 4px; }
    .accuracy-result .row { margin-bottom: 0.1rem; }
    .accuracy-result .row:last-child { margin-bottom: 0; }
    .diff-col { display: inline-flex; flex-direction: column; vertical-align: top; font-size: 1em; background: #fff5f5; border-radius: 2px; }
    .diff-original-line { font-size: 1em; color: #c00; line-height: 1.3; padding: 0 2px; background: #e8f5e9; border-radius: 2px 2px 0 0; }
    .diff-extracted-line { line-height: 1.3; font-size: 1em; }
    .diff-extracted-line.diff-wrong { background: #ffcccc; border-radius: 2px; }
    .diff-extracted-line.diff-wrong-kr { background: #ff0000; color: #fff; font-weight: 600; border-radius: 2px; }
    .diff-extracted-line.diff-ins { background: #ffe0b2; border-radius: 2px; }
    .diff-del-wrap { font-size: 1em; background: #f5f0fa; }
    .diff-del-wrap .diff-original-line { color: #6a1b9a; background: #e8f5e9; border-radius: 2px 2px 0 0; }
    .diff-del-wrap .diff-extracted-line { background: #e1bee7; color: #6a1b9a; }
    .page-nav { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .page-nav-btn { padding: 0.25rem 0.6rem; font-size: 0.85rem; }
    .page-nav-label { font-size: 0.9rem; color: #444; }
    .result-header-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .compare-hint { font-size: 0.85rem; color: #666; }
    .btn-sm { font-size: 0.8rem; padding: 0.25rem 0.6rem; }
    .upload-wrap.drag-over { border-color: #333; background: #f8f8f8; }
    .ocr-toggle-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .ocr-toggle-wrap input[type="checkbox"] { width: 1rem; height: 1rem; cursor: pointer; }
    .ocr-toggle-wrap label { cursor: pointer; font-size: 0.9rem; user-select: none; }
  </style>
</head>
<body>
  <h1>PDF TO TEXT CONVERTER</h1>
  <div class="upload-wrap" id="uploadWrap">
    <label>
      <span>PDF 파일 선택 또는 여기에 드래그</span>
      <input type="file" id="fileInput" accept="application/pdf" />
    </label>
    <div class="ocr-toggle-wrap">
      <input type="checkbox" id="forceOcrToggle" />
      <label for="forceOcrToggle">OCR 모드 (ON: 모든 페이지 OCR 강제)</label>
    </div>
    <button type="button" id="uploadBtn" disabled>업로드 및 OCR</button>
  </div>

  <div class="h-16"></div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="h-4"></div>
    <div class="progress-info">
      <div class="progress-label" id="progressLabel">준비 중...</div>
      <div class="progress-time" id="progressTime"></div>
    </div>
  </div>

  <div class="h-16"></div>

  <div id="resultSection" hidden>
    <div class="result-header">
      <div class="result-header-left">
        <div class="result-title">추출 결과</div>
        <div id="accuracyResult" class="accuracy-result" hidden></div>
      </div>
      <div class="result-header-actions">
        <button type="button" id="pageViewBtn" class="page-nav-btn" hidden>페이지별 보기</button>
        <div id="pageNavWrap" class="page-nav" hidden>
          <button type="button" id="pagePrevBtn" class="page-nav-btn">이전</button>
          <span id="pageNavLabel" class="page-nav-label">1 / 1</span>
          <button type="button" id="pageNextBtn" class="page-nav-btn">다음</button>
        </div>
        <button type="button" id="diffToggleBtn" class="btn-sm" hidden>diff 끄기</button>
        <button type="button" id="diffCopyBtn" class="btn-sm" hidden>diff 복사</button>
        <button type="button" id="copyBtn" class="btn-sm">복사하기</button>
      </div>
    </div>
    <div class="h-4"></div>
    <div class="method-info" id="methodInfo"></div>
    <div class="h-6"></div>
    <pre class="result-text" id="resultText"></pre>

    <div class="h-16"></div>
    <div class="compare-section">
      <label class="compare-label" id="compareLabel">원본 텍스트 (비교용)</label>
      <span id="compareHint" class="compare-hint" hidden>페이지별 보기 시: 원본을 빈 줄로 구분해 페이지 순서대로 붙여넣으세요.</span>
      <textarea id="originalInput" class="compare-textarea" placeholder="원본 PDF 내용을 붙여넣으세요"></textarea>
      <button type="button" id="compareBtn">정확도 비교</button>
    </div>
  </div>
  <div class="error" id="errorEl" role="alert"></div>

  <script>
    var fileInput = document.getElementById('fileInput');
    var uploadBtn = document.getElementById('uploadBtn');
    var progressWrap = document.getElementById('progressWrap');
    var progressFill = document.getElementById('progressFill');
    var progressLabel = document.getElementById('progressLabel');
    var progressTime = document.getElementById('progressTime');
    var resultSection = document.getElementById('resultSection');
    var resultText = document.getElementById('resultText');
    var methodInfo = document.getElementById('methodInfo');
    var errorEl = document.getElementById('errorEl');

    var startTime = 0;
    var timerInterval = null;
    var rawExtractedText = '';
    var pageTexts = [];
    var totalPages = 0;
    var currentPage = 1;
    var pageViewMode = 'all';
    var cachedDiffHtml = '';
    var cachedCompareData = null;

    function formatMMSS(ms) {
      var totalSec = Math.floor(ms / 1000);
      var min = String(Math.floor(totalSec / 60)).padStart(2, '0');
      var sec = String(totalSec % 60).padStart(2, '0');
      return min + ':' + sec;
    }

    function estimateRemaining(elapsed, page, total) {
      if (page <= 0) return '--:--';
      var perPage = elapsed / page;
      var remaining = perPage * (total - page);
      return formatMMSS(remaining);
    }

    function startTimer() {
      startTime = Date.now();
      progressTime.textContent = '경과 00:00 | 예상 --:--';
      timerInterval = setInterval(function () {
        var elapsed = Date.now() - startTime;
        progressTime.textContent = '경과 ' + formatMMSS(elapsed) + ' | 예상 --:--';
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function updateTimerWithEstimate(page, total) {
      var elapsed = Date.now() - startTime;
      var est = estimateRemaining(elapsed, page, total);
      progressTime.textContent = '경과 ' + formatMMSS(elapsed) + ' | 예상 ' + est;
    }

    function showError(message) {
      stopTimer();
      errorEl.textContent = message;
      resultSection.hidden = true;
      progressWrap.style.display = 'none';
    }

    function clearError() {
      errorEl.textContent = '';
    }

    function handleFileChange() {
      uploadBtn.disabled = !fileInput.files || fileInput.files.length === 0;
      clearError();
    }

    function setFileFromDrop(file) {
      if (!file || file.type !== 'application/pdf') {
        errorEl.textContent = 'PDF 파일만 업로드 가능합니다.';
        return;
      }
      clearError();
      var dt = new DataTransfer();
      dt.items.add(file);
      fileInput.files = dt.files;
      uploadBtn.disabled = false;
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'copy';
      document.getElementById('uploadWrap').classList.add('drag-over');
    }

    function handleDragLeave(e) {
      e.preventDefault();
      e.stopPropagation();
      if (!e.currentTarget.contains(e.relatedTarget)) {
        document.getElementById('uploadWrap').classList.remove('drag-over');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      document.getElementById('uploadWrap').classList.remove('drag-over');
      var file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) setFileFromDrop(file);
    }

    function updateProgress(page, total, method) {
      var pct = Math.round((page / total) * 100);
      progressFill.style.width = pct + '%';
      var methodLabel = method === 'direct' ? '직접 추출' : method === 'error' ? '오류(건너뜀)' : 'OCR';
      progressLabel.textContent = page + ' / ' + total + ' 페이지 (' + methodLabel + ') — ' + pct + '%';
      updateTimerWithEstimate(page, total);
    }

    async function handleUploadClick() {
      var file = fileInput.files && fileInput.files[0];
      if (!file) return;
      clearError();
      resultSection.hidden = true;
      uploadBtn.disabled = true;
      pageTexts = [];
      progressFill.style.width = '0%';
      progressLabel.textContent = '업로드 중...';
      progressTime.textContent = '';
      progressWrap.style.display = 'block';
      startTimer();

      var formData = new FormData();
      formData.append('file', file);
      var forceOcrToggle = document.getElementById('forceOcrToggle');
      if (forceOcrToggle && forceOcrToggle.checked) {
        formData.append('force_ocr', 'true');
      }

      try {
        var res = await fetch('/ocr', { method: 'POST', body: formData });

        if (!res.ok) {
          var errData = await res.json().catch(function () { return {}; });
          showError(errData.detail || '요청 실패: ' + res.status);
          return;
        }

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';

        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });

          var lines = buffer.split('\n');
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            var data = JSON.parse(line);

            if (data.done) {
              stopTimer();
              var totalElapsed = Date.now() - startTime;
              progressFill.style.width = '100%';
              progressLabel.textContent = '완료!';
              progressTime.textContent = '작업 완료 ' + formatMMSS(totalElapsed);
              rawExtractedText = data.text || '(텍스트 없음)';
              totalPages = data.total || pageTexts.length || 1;
              resultText.textContent = rawExtractedText;
              methodInfo.textContent = data.methods ? '추출 방식: ' + data.methods.join(', ') : '';
              document.getElementById('accuracyResult').hidden = true;
              cachedDiffHtml = '';
              cachedCompareData = null;
              document.getElementById('diffToggleBtn').hidden = true;
              document.getElementById('diffCopyBtn').hidden = true;
              pageViewMode = 'all';
              currentPage = 1;
              document.getElementById('pageViewBtn').hidden = totalPages <= 1;
              document.getElementById('pageNavWrap').hidden = true;
              resultSection.hidden = false;
            } else {
              if (data.page >= 1 && data.text !== undefined) {
                pageTexts[data.page - 1] = data.text || '';
              }
              var method = data.error ? 'error' : (data.method || '');
              updateProgress(data.page || 0, data.total || 0, method);
            }
          }
        }
      } catch (err) {
        showError('연결 오류: ' + err.message);
      } finally {
        stopTimer();
        uploadBtn.disabled = false;
      }
    }

    function handleCopyBtnClick() {
      var text = getCurrentPageText();
      navigator.clipboard.writeText(text).then(function () {
        var btn = document.getElementById('copyBtn');
        btn.textContent = '복사됨!';
        setTimeout(function () { btn.textContent = '복사하기'; }, 1500);
      });
    }

    function charType(c) {
      if (!c) return 'other';
      if (/[\uac00-\ud7a3\u1100-\u11ff\u3130-\u318f]/.test(c)) return 'korean';
      if (/[a-zA-Z]/.test(c)) return 'english';
      if (/[0-9]/.test(c)) return 'digit';
      if (/[\u4e00-\u9fff\u3400-\u4dbf]/.test(c)) return 'chinese';
      return 'other';
    }

    function accuracyByType(ops) {
      var counts = { korean: [0,0,0], english: [0,0,0], digit: [0,0,0], chinese: [0,0,0] };
      function nextGt(idx) {
        for (var j = idx + 1; j < ops.length; j++) {
          if (ops[j].gt && (ops[j].type === 'm' || ops[j].type === 's' || ops[j].type === 'd'))
            return ops[j].gt;
        }
        for (var k = idx - 1; k >= 0; k--) {
          if (ops[k].gt && (ops[k].type === 'm' || ops[k].type === 's' || ops[k].type === 'd'))
            return ops[k].gt;
        }
        return '';
      }
      for (var idx = 0; idx < ops.length; idx++) {
        var op = ops[idx], gt = op.gt, ocr = op.ocr;
        if (op.type === 'm') {
          var t = charType(gt);
          if (t !== 'other') { counts[t][0]++; counts[t][1]++; }
        } else if (op.type === 's' || op.type === 'd') {
          var t = charType(gt);
          if (t !== 'other') { counts[t][0]++; counts[t][2]++; }
        } else if (op.type === 'i') {
          var ocrT = charType(ocr);
          if (ocrT !== 'other') {
            var nextT = charType(nextGt(idx));
            var attr = nextT !== 'other' ? nextT : ocrT;
            counts[attr][0]++; counts[attr][2]++;
          }
        }
      }
      function acc(gtCount, ok, wrongCount) {
        if (gtCount === 0) return { pct: null, correct: 0, wrong: 0, gtCount: 0 };
        return { pct: Math.round(ok / gtCount * 1000) / 10, correct: ok, wrong: wrongCount, gtCount: gtCount };
      }
      return {
        korean: acc(counts.korean[0], counts.korean[1], counts.korean[2]),
        english: acc(counts.english[0], counts.english[1], counts.english[2]),
        digit: acc(counts.digit[0], counts.digit[1], counts.digit[2]),
        chinese: acc(counts.chinese[0], counts.chinese[1], counts.chinese[2])
      };
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function isWhitespace(c) {
      return /[\s\u00a0]/.test(c);
    }

    function computeDiffOps(original, extracted) {
      var m = original.length;
      var n = extracted.length;
      var dp = [];
      for (var i = 0; i <= m; i++) {
        dp[i] = [];
        for (var j = 0; j <= n; j++) {
          if (i === 0) dp[i][j] = j;
          else if (j === 0) dp[i][j] = i;
          else {
            var a = original[i - 1], b = extracted[j - 1];
            var cost = (a === b || (isWhitespace(a) && isWhitespace(b))) ? 0 : 1;
            dp[i][j] = Math.min(
              dp[i - 1][j - 1] + cost,
              dp[i][j - 1] + 1,
              dp[i - 1][j] + 1
            );
          }
        }
      }
      var ops = [];
      var i = m, j = n;
      while (i > 0 || j > 0) {
        var a = i > 0 ? original[i - 1] : '', b = j > 0 ? extracted[j - 1] : '';
        var same = (a === b || (isWhitespace(a) && isWhitespace(b)));
        if (i > 0 && j > 0 && same && dp[i][j] === dp[i - 1][j - 1]) {
          ops.unshift({ type: 'm', gt: a, ocr: b });
          i--; j--;
        } else if (i > 0 && j > 0 && dp[i][j] === dp[i - 1][j - 1] + 1) {
          ops.unshift({ type: 's', gt: a, ocr: b });
          i--; j--;
        } else if (j > 0 && dp[i][j] === dp[i][j - 1] + 1) {
          ops.unshift({ type: 'i', gt: '', ocr: b });
          j--;
        } else {
          ops.unshift({ type: 'd', gt: a, ocr: '' });
          i--;
        }
      }
      return ops;
    }

    function buildDiffHtml(original, extracted) {
      var ops = computeDiffOps(original, extracted);
      var html = '';
      for (var k = 0; k < ops.length; k++) {
        var op = ops[k];
        if (op.type === 'm') {
          html += escapeHtml(op.ocr);
        } else if (op.type === 's') {
          var wrongClass = charType(op.gt) === 'korean' ? 'diff-wrong-kr' : 'diff-wrong';
          html += '<span class="diff-col"><span class="diff-original-line">' + escapeHtml(op.gt) + '</span><span class="diff-extracted-line ' + wrongClass + '">' + escapeHtml(op.ocr) + '</span></span>';
        } else if (op.type === 'i') {
          html += '<span class="diff-extracted-line diff-ins">' + escapeHtml(op.ocr) + '</span>';
        } else if (op.type === 'd') {
          html += '<span class="diff-col diff-del-wrap"><span class="diff-original-line">' + escapeHtml(op.gt) + '</span><span class="diff-extracted-line">·</span></span>';
        }
      }
      return html;
    }

    function getOriginalForCompare() {
      var original = document.getElementById('originalInput').value.trim();
      if (pageViewMode === 'page' && totalPages > 1) {
        var parts = original.split(/\n\n+/).map(function (s) { return s.trim(); }).filter(Boolean);
        if (parts.length >= currentPage) {
          return parts[currentPage - 1];
        }
      }
      return original;
    }

    function handleCompareBtnClick() {
      var original = getOriginalForCompare();
      var extracted = getCurrentPageText() || '';

      if (!document.getElementById('originalInput').value.trim()) {
        errorEl.textContent = '원본 텍스트를 입력하세요.';
        return;
      }

      var ops = computeDiffOps(original, extracted);
      var rates = accuracyByType(ops);
      var labels = { korean: '한글', english: '영어', digit: '숫자', chinese: '한자' };

      var accEl = document.getElementById('accuracyResult');
      accEl.hidden = false;
      clearError();

      var lines = [];
      var accLines = [];
      for (var key in labels) {
        var r = rates[key];
        if (r.gtCount > 0) {
          lines.push('<div class="row">' + labels[key] + ': ' + r.pct + '% (맞음 ' + r.correct + '자 / 틀림 ' + r.wrong + '자 / 원본 ' + r.gtCount + '자)</div>');
          accLines.push(labels[key] + ': ' + r.pct + '% (맞음 ' + r.correct + '자 / 틀림 ' + r.wrong + '자 / 원본 ' + r.gtCount + '자)');
        } else {
          lines.push('<div class="row">' + labels[key] + ': 원본에 ' + labels[key] + ' 없음 (N/A)</div>');
          accLines.push(labels[key] + ': 원본에 ' + labels[key] + ' 없음 (N/A)');
        }
      }

      accEl.innerHTML = '<strong>OCR 인식률</strong><div class="h-4"></div>' + lines.join('');

      cachedDiffHtml = buildDiffHtml(original, extracted);
      cachedCompareData = {
        original: original,
        extracted: extracted,
        accuracyLines: accLines
      };
      resultText.innerHTML = cachedDiffHtml;
      var toggleBtn = document.getElementById('diffToggleBtn');
      var diffCopyBtn = document.getElementById('diffCopyBtn');
      toggleBtn.hidden = false;
      toggleBtn.textContent = 'diff 끄기';
      diffCopyBtn.hidden = false;
    }

    function buildDiffCopyText() {
      if (!cachedCompareData) return '';
      var d = cachedCompareData;
      var lines = [
        '=== OCR 비교 데이터 (AI 보완용) ===',
        '',
        '[원본]',
        d.original,
        '',
        '[추출]',
        d.extracted,
        '',
        '[OCR 인식률]',
        d.accuracyLines.join('\n'),
        '',
        '---'
      ];
      return lines.join('\n');
    }

    function handleDiffCopyClick() {
      var text = buildDiffCopyText();
      if (!text) return;
      navigator.clipboard.writeText(text).then(function () {
        var btn = document.getElementById('diffCopyBtn');
        btn.textContent = '복사됨!';
        setTimeout(function () { btn.textContent = 'diff 복사'; }, 1500);
      });
    }

    function handleDiffToggleClick() {
      var toggleBtn = document.getElementById('diffToggleBtn');
      if (!cachedDiffHtml) return;
      if (toggleBtn.textContent === 'diff 끄기') {
        resultText.textContent = getCurrentPageText();
        toggleBtn.textContent = 'diff 보기';
      } else {
        resultText.innerHTML = cachedDiffHtml;
        toggleBtn.textContent = 'diff 끄기';
      }
    }

    function getCurrentPageText() {
      if (pageViewMode === 'all') return rawExtractedText;
      return pageTexts[currentPage - 1] || '(해당 페이지 텍스트 없음)';
    }

    function updateResultDisplay() {
      var text = getCurrentPageText();
      if (cachedDiffHtml && document.getElementById('diffToggleBtn').textContent === 'diff 보기') {
        resultText.textContent = text;
      } else if (!cachedDiffHtml) {
        resultText.textContent = text;
      }
    }

    function updatePageNav() {
      document.getElementById('pageNavLabel').textContent = currentPage + ' / ' + totalPages;
      document.getElementById('pagePrevBtn').disabled = currentPage <= 1;
      document.getElementById('pageNextBtn').disabled = currentPage >= totalPages;
    }

    function handlePageViewClick() {
      if (pageViewMode === 'all') {
        pageViewMode = 'page';
        currentPage = 1;
        document.getElementById('pageViewBtn').textContent = '전체 보기';
        document.getElementById('pageNavWrap').hidden = false;
        document.getElementById('compareHint').hidden = false;
        updatePageNav();
      } else {
        pageViewMode = 'all';
        document.getElementById('pageViewBtn').textContent = '페이지별 보기';
        document.getElementById('pageNavWrap').hidden = true;
        document.getElementById('compareHint').hidden = true;
      }
      resetCompareState();
      resultText.textContent = getCurrentPageText();
    }

    function resetCompareState() {
      cachedDiffHtml = '';
      cachedCompareData = null;
      document.getElementById('accuracyResult').hidden = true;
      document.getElementById('diffToggleBtn').hidden = true;
      document.getElementById('diffCopyBtn').hidden = true;
    }

    function handlePagePrevClick() {
      if (currentPage <= 1) return;
      currentPage--;
      updatePageNav();
      resetCompareState();
      resultText.textContent = getCurrentPageText();
    }

    function handlePageNextClick() {
      if (currentPage >= totalPages) return;
      currentPage++;
      updatePageNav();
      resetCompareState();
      resultText.textContent = getCurrentPageText();
    }

    fileInput.addEventListener('change', handleFileChange);
    var uploadWrap = document.getElementById('uploadWrap');
    uploadWrap.addEventListener('dragover', handleDragOver);
    uploadWrap.addEventListener('dragleave', handleDragLeave);
    uploadWrap.addEventListener('drop', handleDrop);
    uploadBtn.addEventListener('click', handleUploadClick);
    document.getElementById('pageViewBtn').addEventListener('click', handlePageViewClick);
    document.getElementById('pagePrevBtn').addEventListener('click', handlePagePrevClick);
    document.getElementById('pageNextBtn').addEventListener('click', handlePageNextClick);
    document.getElementById('copyBtn').addEventListener('click', handleCopyBtnClick);
    document.getElementById('compareBtn').addEventListener('click', handleCompareBtnClick);
    document.getElementById('diffToggleBtn').addEventListener('click', handleDiffToggleClick);
    document.getElementById('diffCopyBtn').addEventListener('click', handleDiffCopyClick);
  </script>
</body>
</html>
